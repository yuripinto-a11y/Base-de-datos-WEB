<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Personas – CRUD</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background-color: #eee; }
        input, button { padding: 6px; margin: 5px 0; }
        #formulario { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Gestión de Personas</h1>

    <h2>Agregar Persona</h2>
    <div id="formulario">
        <input type="text" id="nombre" placeholder="Nombre" required><br>
        <input type="email" id="correo" placeholder="Correo" required><br>
        <button onclick="agregarPersona()">Guardar</button>
    </div>

    <h2>Listado</h2>
    <table id="tabla">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Acciones</th>
        </tr>
    </table>

<script>
const API = "https://yuripinto-a11y.github.io/Base-de-datos-WEB/";  // ← CAMBIA ESTA IP A LA DE TU SERVIDOR FLASK

// -------------------------
// Cargar listado
// -------------------------
function cargarPersonas() {
    fetch(API + "/personas")
        .then(res => res.json())
        .then(data => {
            const tabla = document.getElementById("tabla");
            tabla.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            `;

            data.forEach(p => {
                tabla.innerHTML += `
                    <tr>
                        <td>${p[0]}</td>
                        <td>${p[1]}</td>
                        <td>${p[2]}</td>
                        <td>
                            <button onclick="editarPersona(${p[0]}, '${p[1]}', '${p[2]}')">Editar</button>
                            <button onclick="eliminarPersona(${p[0]})">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        });
}

// -------------------------
// Agregar persona
// -------------------------
function agregarPersona() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;

    fetch(API + "/personas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, correo })
    })
    .then(() => cargarPersonas());
}

// -------------------------
// Editar persona
// -------------------------
function editarPersona(id, nombreActual, correoActual) {
    const nuevoNombre = prompt("Nuevo nombre:", nombreActual);
    const nuevoCorreo = prompt("Nuevo correo:", correoActual);

    if (!nuevoNombre || !nuevoCorreo) return;

    fetch(API + "/editar/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `nombre=${nuevoNombre}&correo=${nuevoCorreo}`
    })
    .then(() => cargarPersonas());
}

// -------------------------
// Eliminar persona
// -------------------------
function eliminarPersona(id) {
    if (!confirm("¿Eliminar esta persona?")) return;

    fetch(API + "/eliminar/" + id, { method: "POST" })
        .then(() => cargarPersonas());
}

// -------------------------
// Inicializar
// -------------------------
cargarPersonas();
</script>

</body>
</html>
